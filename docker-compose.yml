services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: marketplace1
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 12345678
      DB_NAME: marketplace1
      DB_PORT: 5432
      NOTIFICATION_SERVICE_URL: http://notification-service:8082
    volumes:
      - uploads_data:/app/uploads

  notification-service:
    build: ./notification-service
    ports:
      - "8082:8082"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
